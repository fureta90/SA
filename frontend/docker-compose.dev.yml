services:
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: correos-frontend-dev
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - correos-net
    environment:
      - VITE_API_BASE_URL=http://localhost:3001

networks:
  correos-net:
    driver: bridge
