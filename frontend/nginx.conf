server {
    listen 80;
    server_name localhost;  # Traefik entra en la red, no importa el host

    root /usr/share/nginx/html;
    index index.html;

    # Proxy reverso para el Backend
    location /api-backend/ {
        # 'backend' debe ser el nombre del servicio en tu docker-compose.yml
        # Asegúrate de poner la barra al final (http://backend:3000/) 
        # para que Nginx elimine '/api-backend/' de la ruta.
        proxy_pass http://backend:3000/;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # SPA fallback - todas las rutas van a index.html
    location / {
        try_files $uri /index.html;
    }

    # Logo: evitar cache agresiva para poder reemplazarlo sin problemas
    location ^~ /logo-FindControl/ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # Cache para archivos estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cache para index.html para asegurar que siempre se cargue la versión más reciente
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    
}
