services:
  axiumbackend:
    environment:
      SPEECH_ANALYZE_TOKEN: "Speech4nalytics2026"
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: axium-backend
    restart: always
    env_file: ./backend/.env
    networks:
      - proxy_net
      - correos-net
      - internal-net
    depends_on:
      - redis
    expose:
      - "4001"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy_net"

      # API
      - "traefik.http.routers.axium-api.rule=Host(`axium.findcontrol.info`) && PathPrefix(`/api-backend`)"
      - "traefik.http.routers.axium-api.entrypoints=websecure"
      - "traefik.http.routers.axium-api.tls.certresolver=le"
      - "traefik.http.services.axium-api.loadbalancer.server.port=4001"

      # Prioridad alta para API
      - "traefik.http.routers.axium-api.priority=10"

  axiumfrontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: axium-frontend
    restart: always
    networks:
      - proxy_net
      - correos-net
    depends_on:
      - axiumbackend
    expose:
      - "5174"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy_net"

      # Frontend
      - "traefik.http.routers.axium.rule=Host(`axium.findcontrol.info`) && !PathPrefix(`/api-backend`)"
      - "traefik.http.routers.axium.entrypoints=websecure"
      - "traefik.http.routers.axium.tls.certresolver=le"
      - "traefik.http.services.axium.loadbalancer.server.port=80"

      # Prioridad baja
      - "traefik.http.routers.axium.priority=1"

  redis:
    image: redis:7-alpine
    container_name: axium-redis
    restart: always
    networks:
      - internal-net
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

networks:
  proxy_net:
    external: true
  correos-net:
    external: true
  internal-net:
    driver: bridge

volumes:
  redis-data: